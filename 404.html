<!DOCTYPE html>
<html lang="en" id="html-root">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>404 - Page Not Found</title>
    <script>
        // Detect locale from URL or browser, then redirect
        (function () {
            const path = window.location.pathname;
            let locale = 'en'; // default fallback

            // 1. Check URL for locale
            if (path.startsWith('/fr/') || path.includes('/fr/')) {
                locale = 'fr';
            } else if (path.startsWith('/es/') || path.includes('/es/')) {
                locale = 'es';
            } else {
                // 2. Fallback to browser language
                const browserLang = navigator.language.split('-')[0];
                if (browserLang === 'fr') {
                    locale = 'fr';
                } else if (browserLang === 'es') {
                    locale = 'es';
                }
            }

            // Redirect to localized 404 page
            window.location.href = `/${locale}/404/`;
        })();
    </script>
</head>

<body>
    <p style="text-align: center; margin-top: 50px;">Redirecting...</p>
</body>

</html>
